<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Amazon → Shopify Customizer</title>
    <link rel="stylesheet" href="./admin.css">
  </head>
  <body>
    <main class="admin-shell">
      <header>
        <p class="eyebrow">Shopify custom app</p>
        <h1>Amazon Customizer Sync</h1>
        <p>Dán raw <code>gc:app-config</code>, kiểm tra kết quả rồi đồng bộ vào product metafield.</p>
      </header>
      <section id="proxy-panel" class="proxy-panel" aria-live="polite">
        <div>
          <span class="proxy-kicker">Proxy</span>
          <strong id="proxy-state">Đang kiểm tra...</strong>
        </div>
        <div class="proxy-detail">
          <span id="proxy-url">-</span>
          <span id="proxy-location">-</span>
          <span id="proxy-shop">-</span>
        </div>
      </section>
      <section class="card amazon-link-tool">
        <div class="section-title">
          <h2>Amazon customization link</h2>
          <span id="amazon-link-status"></span>
        </div>
        <label class="wide">Amazon product URL
          <input id="amazon-product-url" placeholder="https://www.amazon.com/dp/...">
        </label>
        <div class="actions">
          <button id="fetch-amazon-link" type="button">Fetch customization link</button>
          <button id="open-amazon-link" type="button" disabled>Open link</button>
          <button id="copy-console-code" type="button">Copy console code</button>
        </div>
        <label class="wide">Customization URL
          <textarea id="amazon-customization-url" class="link-output" readonly spellcheck="false"></textarea>
        </label>
      </section>
      <section class="card form-grid">
        <label>Shopify Product ID
          <input id="product-id" placeholder="11053922189479 hoặc gid://shopify/Product/…">
        </label>
        <label>Admin secret
          <input id="admin-secret" type="password" autocomplete="off" placeholder="CUSTOMIZER_ADMIN_SECRET">
        </label>
        <label>Price multiplier
          <input id="price-multiplier" type="number" min="0.0001" step="any" placeholder="Optional, for example 1 if Amazon amounts already map to USD">
        </label>
        <label class="wide">Raw Amazon JSON
          <textarea id="raw-json" spellcheck="false" placeholder='{"asin":"…","sellerConfigComponents":{…}}'></textarea>
        </label>
        <div class="actions wide">
          <button id="convert" type="button">Convert &amp; Preview</button>
          <button id="dry-run" type="button" disabled>Dry-run Sync</button>
          <button id="sync" class="primary" type="button" disabled>Sync to Shopify</button>
        </div>
        <p id="status" class="status wide" role="status"></p>
      </section>
      <section id="summary" class="card" hidden></section>
      <section class="card">
        <div class="section-title"><h2>Normalized JSON</h2><span id="byte-count"></span></div>
        <textarea id="normalized-json" class="output" readonly spellcheck="false"></textarea>
      </section>
    </main>
    <script src="./admin.js"></script>
  </body>
</html>
